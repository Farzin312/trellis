<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Trellis guided setup flow</title>
  <desc id="desc">Mandatory answers become a validated plan, a reviewed core setup, selected add-ons, and empirical evidence.</desc>
  <rect width="1200" height="620" rx="28" fill="#0b1020"/>
  <text x="64" y="70" fill="#f4f8ff" font-family="Inter, ui-sans-serif, system-ui" font-size="34" font-weight="700">From informed answers to owned evidence</text>
  <text x="64" y="105" fill="#91a4c5" font-family="Inter, ui-sans-serif, system-ui" font-size="18">One core. Need-based add-ons. No mutation before review and approval.</text>
  <g font-family="Inter, ui-sans-serif, system-ui" text-anchor="middle">
    <g>
      <rect x="58" y="155" width="230" height="132" rx="18" fill="#102946" stroke="#27c3e6" stroke-width="2"/>
      <text x="173" y="202" fill="#62dcf5" font-size="15" font-weight="700" letter-spacing="1">01 · QUESTIONS</text>
      <text x="173" y="235" fill="#f4f8ff" font-size="23" font-weight="650">Mandatory inputs</text>
      <text x="173" y="264" fill="#a9bad4" font-size="15">scope · stacks · risks · needs</text>
    </g>
    <g>
      <rect x="338" y="155" width="230" height="132" rx="18" fill="#152243" stroke="#8295ff" stroke-width="2"/>
      <text x="453" y="202" fill="#aeb9ff" font-size="15" font-weight="700" letter-spacing="1">02 · PLAN</text>
      <text x="453" y="235" fill="#f4f8ff" font-size="23" font-weight="650">Validated &amp; read-only</text>
      <text x="453" y="264" fill="#a9bad4" font-size="15">benefits · drawbacks · owners</text>
    </g>
    <g>
      <rect x="618" y="155" width="230" height="132" rx="18" fill="#163128" stroke="#69dc8f" stroke-width="2"/>
      <text x="733" y="202" fill="#89efaa" font-size="15" font-weight="700" letter-spacing="1">03 · CORE</text>
      <text x="733" y="235" fill="#f4f8ff" font-size="23" font-weight="650">Atomic or reviewed</text>
      <text x="733" y="264" fill="#a9bad4" font-size="15">new scaffold · brownfield merge</text>
    </g>
    <g>
      <rect x="898" y="155" width="244" height="132" rx="18" fill="#332617" stroke="#f2b95f" stroke-width="2"/>
      <text x="1020" y="202" fill="#ffd48d" font-size="15" font-weight="700" letter-spacing="1">04 · EVIDENCE</text>
      <text x="1020" y="235" fill="#f4f8ff" font-size="23" font-weight="650">One blocking gate</text>
      <text x="1020" y="264" fill="#a9bad4" font-size="15">PASS ≠ WARN ≠ SKIP</text>
    </g>
    <g fill="none" stroke="#536987" stroke-width="4" stroke-linecap="round">
      <path d="M288 221h42"/><path d="M568 221h42"/><path d="M848 221h42"/>
    </g>
    <g fill="#91a4c5">
      <path d="M330 221l-12-8v16z"/><path d="M610 221l-12-8v16z"/><path d="M890 221l-12-8v16z"/>
    </g>
  </g>
  <path d="M733 287v45" stroke="#536987" stroke-width="4"/>
  <path d="M733 332l-8-12h16z" fill="#91a4c5"/>
  <text x="64" y="372" fill="#f4f8ff" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="650">Selected only when the maintenance cost solves a current problem</text>
  <g font-family="Inter, ui-sans-serif, system-ui">
    <g>
      <rect x="58" y="404" width="330" height="146" rx="18" fill="#101c30" stroke="#27c3e6"/>
      <circle cx="92" cy="442" r="9" fill="#27c3e6"/>
      <text x="116" y="449" fill="#f4f8ff" font-size="21" font-weight="680">Graphify</text>
      <text x="86" y="486" fill="#a9bad4" font-size="16">Explore symbols and relationships.</text>
      <text x="86" y="516" fill="#6f86a8" font-size="14">Cost: Python + skill + graph + CI.</text>
    </g>
    <g>
      <rect x="435" y="404" width="330" height="146" rx="18" fill="#101c30" stroke="#8295ff"/>
      <circle cx="469" cy="442" r="9" fill="#8295ff"/>
      <text x="493" y="449" fill="#f4f8ff" font-size="21" font-weight="680">Bounds</text>
      <text x="463" y="486" fill="#a9bad4" font-size="16">Enforce reviewed architecture intent.</text>
      <text x="463" y="516" fill="#6f86a8" font-size="14">Cost: ownership curation + coverage.</text>
    </g>
    <g>
      <rect x="812" y="404" width="330" height="146" rx="18" fill="#101c30" stroke="#69dc8f"/>
      <circle cx="846" cy="442" r="9" fill="#69dc8f"/>
      <text x="870" y="449" fill="#f4f8ff" font-size="21" font-weight="680">Phoenix</text>
      <text x="840" y="486" fill="#a9bad4" font-size="16">Inspect traces after instrumentation.</text>
      <text x="840" y="516" fill="#6f86a8" font-size="14">Cost: Docker + storage + SDK work.</text>
    </g>
  </g>
  <text x="64" y="592" fill="#6f86a8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Core operation remains local and dependency-free; add-on readiness is verified separately.</text>
</svg>
